<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Out Cravings</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #fc8019;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* SCREENS */
.screen {
  display: none;
  padding-bottom: 70px;
}
.active {
  display: block;
}

/* SEARCH */
.search {
  padding: 10px;
}
.search input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* PRODUCTS */
.card {
  display: flex;
  background: white;
  margin: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: cover;
}

.details {
  padding: 10px;
  flex: 1;
}

.price {
  color: #fc8019;
}

.btn {
  background: #fc8019;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}

/* CART */
.cart-item {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

/* BOTTOM NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  border-top: 1px solid #ccc;
}

.nav div {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Night Out Cravings 🌙</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="search">
    <input type="text" placeholder="Search..." onkeyup="searchItem(this.value)">
  </div>
  <div id="products"></div>
</div>

<!-- CART -->
<div id="cart" class="screen">
  <h3 style="text-align:center;">Your Cart</h3>
  <div id="cartItems"></div>
  <h3 style="text-align:center;">Total: ₹<span id="total">0</span></h3>
  <div style="text-align:center;">
    <button class="btn" onclick="orderNow()">Order on WhatsApp</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h3 style="text-align:center;">👤 Profile</h3>
  <p style="text-align:center;">Night Out Cravings User</p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠 Home</div>
  <div onclick="show('cart')">🛒 Cart</div>
  <div onclick="show('profile')">👤 Profile</div>
</div>

<script>
const items = [
  {name:"Burger", price:120, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
  {name:"Pizza", price:250, img:"https://images.unsplash.com/photo-1601924582975-7e6cbe9c55a3"},
  {name:"Kurkure", price:20, img:"https://images.unsplash.com/photo-1599490659213-e2b9527bd087"},
  {name:"Tedhe Medhe", price:20, img:"https://images.unsplash.com/photo-1625944230945-1b7dd3b949ab"},
  {name:"Chocobakes", price:10, img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52"},
  {name:"Jim Jam", price:20, img:"https://images.unsplash.com/photo-1589307004391-2d3d3c4d56b6"}
];

let cart = {};
items.forEach((_,i)=>cart[i]=0);

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach((item,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <div class="details">
          <h4>${item.name}</h4>
          <div class="price">₹${item.price}</div>
          <button class="btn" onclick="add(${i})">ADD</button>
        </div>
      </div>
    `;
  });
}

function add(i){
  cart[i]++;
  updateCart();
}

function updateCart(){
  let container = document.getElementById("cartItems");
  container.innerHTML = "";
  let total = 0;

  items.forEach((item,i)=>{
    if(cart[i]>0){
      container.innerHTML += `
        <div class="cart-item">
          ${item.name} x${cart[i]} = ₹${item.price*cart[i]}
        </div>
      `;
      total += item.price*cart[i];
    }
  });

  document.getElementById("total").innerText = total;
}

function show(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

function searchItem(val){
  val = val.toLowerCase();
  render(items.filter(i=>i.name.toLowerCase().includes(val)));
}

function orderNow(){
  let msg = "🌙 Night Out Cravings Order 🌙\n\n";
  let total = 0;

  items.forEach((item,i)=>{
    if(cart[i]>0){
      msg += `👉 ${item.name} x${cart[i]} = ₹${item.price*cart[i]}\n`;
      total += item.price*cart[i];
    }
  });

  if(total===0){
    alert("Add items first!");
    return;
  }

  msg += `\n💰 Total: ₹${total}\n🚀 Deliver fast!`;

  window.open("https://wa.me/9522278253?text="+encodeURIComponent(msg));
}

render(items);
</script>

</body>
</html>
