<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Out Cravings</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #fc8019;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  padding: 10px;
}

.card {
  display: flex;
  background: white;
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: cover;
}

.details {
  padding: 10px;
  flex: 1;
}

/* PRICE TAG */
.price-tag {
  display: inline-block;
  background: linear-gradient(45deg, #fc8019, #ffb347);
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  margin: 5px 0;
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg, #fc8019, #ff5722);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.9);
}

/* DISABLED BUTTON */
.btn-disabled {
  background: gray;
  cursor: not-allowed;
}

/* STOCK STATUS */
.stock {
  font-size: 12px;
  font-weight: bold;
}

.in-stock {
  color: green;
}

.out-stock {
  color: red;
}

/* CART */
.cart {
  position: sticky;
  bottom: 0;
  background: white;
  padding: 10px;
  text-align: center;
  border-top: 1px solid #ccc;
}
</style>
</head>

<div class="header">Night Out Cravings 🌙</div>

<div class="products" id="products"></div>

</div>

let cart = {};
items.forEach((_,i)=>cart[i]=0);

function render(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  items.forEach((item,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <div class="details">
          <h4>${item.name}</h4>

          <div class="price-tag">₹${item.price}</div>

          <div class="stock ${item.stock ? 'in-stock':'out-stock'}">
            ${item.stock ? 'Available':'Out of Stock'}
          </div>

          ${
            item.stock 
            ? `<button class="btn" onclick="add(${i})">ADD</button>`
            : `<button class="btn btn-disabled">Unavailable</button>`
          }
        </div>
      </div>
    `;
  });
}

function add(i){
  cart[i]++;
  updateTotal();
}

function updateTotal(){
  let total = 0;
  items.forEach((item,i)=>{
    total += item.price * cart[i];
  });
  document.getElementById("total").innerText = total;
}

function orderNow(){
  let msg = "🌙 Night Out Cravings Order 🌙\n\n";
  let total = 0;

  items.forEach((item,i)=>{
    if(cart[i]>0){
      msg += `👉 ${item.name} x${cart[i]} = ₹${item.price*cart[i]}\n`;
      total += item.price*cart[i];
    }
  });

  if(total===0){
    alert("Add items first!");
    return;
  }

  msg += `\n💰 Total: ₹${total}\n🚀 Deliver fast please!`;

  window.open("https://wa.me/9522278253?text="+encodeURIComponent(msg));
}

render();
</script>
